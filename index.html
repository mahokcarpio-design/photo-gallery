<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triniberta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Code+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #F5F3EF;
  --ink:        #707854;
  --ink-muted:  #87936C;
  --ink-faint:  #c4c0ba;
  --olive:      rgb(108, 117, 87);
  --olive-dark: rgb(81, 88, 65);
}

html { scroll-behavior: smooth; overflow-x: hidden; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Source Code Pro', monospace;
  font-weight: 300;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── HEADER ───────────────────────────────────────────── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 28px 48px;
  pointer-events: none;
}

.site-name {
  font-family: 'Source Code Pro', monospace;
  font-weight: 300;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
}

.header-right {
  display: flex;
  align-items: baseline;
  gap: 16px;
  pointer-events: all;
}

.site-count {
  font-family: 'Source Code Pro', monospace;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
}

.back-to-top {
  font-family: 'Source Code Pro', monospace;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #908574;
  text-decoration: none;
  transition: color 0.2s ease;
}

.back-to-top:hover { color: var(--ink); }

/* ── HERO ─────────────────────────────────────────────── */
.hero {
  padding: 160px 0 100px;
  text-align: center;
}

.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--olive-dark);
  margin-bottom: 28px;
}

.hero-title {
  font-family: 'Instrument Serif', serif;
  font-weight: 400;
  font-size: clamp(64px, 11vw, 60px);
  line-height: 0.88;
  letter-spacing: -0.02em;
  text-align: center;
  color: var(--ink);
}

.hero-title em {
  font-style: italic;
  font-family: 'Instrument Serif', serif;
  font-weight: 200;
  color: var(--olive);
}

.typing-cursor {
  display: inline-block;
  font-style: normal;
  font-family: 'Source Code Pro', monospace;
  font-weight: 300;
  font-size: 60px;
  color: var(--olive);
  margin-left: 0px;
  vertical-align: baseline;
  animation: blink 1.1s step-start infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

.hero-divider {
  width: 1px;
  height: 60px;
  background: var(--ink-faint);
  margin: 48px auto 0;
  opacity: 0.5;
}

/* ── PROGRESS LINE ────────────────────────────────────── */
#progress-line {
  position: fixed;
  top: 0; left: 0;
  height: 1px;
  background: var(--ink-muted);
  opacity: 0.3;
  width: 0%;
  transition: width 0.1s linear;
  z-index: 200;
}

/* ── GALLERY FLOW ─────────────────────────────────────── */
#gallery {
  padding-bottom: 0px;
}

/* Shared reveal animation */
.gallery-item {
  opacity: 0;
  transform: translateY(20px);
  transition:
    opacity 1.4s cubic-bezier(0.16, 1, 0.3, 1),
    transform 1.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.gallery-item.revealed {
  opacity: 1;
  transform: translateY(0);
}

/* ── PHOTO ITEMS ──────────────────────────────────────── */
.photo-item {
  display: block;
  margin-bottom: 96px;
  /* scatter applied via inline margin-left + transform: rotate() */
}

.photo-label {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: var(--ink-muted);
  margin-bottom: 8px;
  line-height: 1.65;
}

.photo-img-wrap {
  overflow: hidden;
  display: block;
}

.photo-img-wrap img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: repeating-linear-gradient(
    45deg,
    #eae7e1,
    #eae7e1 2px,
    #e2dfd9 2px,
    #e2dfd9 14px
  );
}

.photo-placeholder span {
  font-family: 'Source Code Pro', monospace;
  font-size: 9px;
  font-weight: 300;
  color: var(--ink-muted);
  letter-spacing: 0.08em;
  background: rgba(245, 243, 239, 0.8);
  padding: 5px 8px;
  max-width: 90%;
  text-align: center;
  word-break: break-all;
}

.photo-caption {
  margin-top: 10px;
  font-size: 10px;
  font-weight: 500;
  color: var(--olive);
  line-height: 1.65;
  letter-spacing: 0.2em;
  max-width: 260px;
}

/* ── TEXT ITEMS ───────────────────────────────────────── */
.text-item {
  display: block;
  margin-bottom: 96px;
  padding: 40px 0;
}

/* large: Instrument Serif italic ~40px, 40vw wide */
.text-item.style-large {
  width: clamp(260px, 40vw, 540px);
  min-height: 140px;
}

.text-item.style-large p {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(28px, 3.6vw, 40px);
  line-height: 1.2;
  color: #8C9669;
  white-space: pre-line;
  text-wrap: pretty;
}

/* small: Source Code Pro 300 13px, 30vw wide */
.text-item.style-small {
  width: clamp(180px, 30vw, 380px);
  min-height: 100px;
}

.text-item.style-small p {
  font-family: 'Source Code Pro', monospace;
  font-weight: 300;
  font-size: 13px;
  line-height: 2;
  color: #8C9669;
  letter-spacing: 0.06em;
  white-space: pre-line;
}

/* ── END MESSAGE ──────────────────────────────────────── */
#end-message {
  text-align: center;
  padding: 0px 24px 80px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 1.6s ease, transform 1.6s ease;
}

#end-message.visible {
  opacity: 1;
  transform: translateY(0);
}

#end-message p {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--olive);
  letter-spacing: 0.03em;
}

#end-message::before {
  content: '';
  display: block;
  width: 1px;
  height: 48px;
  background: var(--ink-faint);
  margin: 0 auto 40px;
  opacity: 0.5;
}

#end-message .back-to-top {
  display: inline-block;
  margin-top: 20px;
}

/* ── SENTINEL ─────────────────────────────────────────── */
#sentinel { height: 1px; }

/* ── MOBILE ───────────────────────────────────────────── */
@media (max-width: 768px) {
  .site-header { padding: 20px 24px; }

  .hero {
    padding: 110px 0 60px;
    text-align: center;
    width: 100%;
    margin: 0 auto;
  }

  .photo-item,
  .text-item {
    margin-left: 20px !important;
    transform: none !important;
  }

  .photo-img-wrap {
    max-width: calc(100vw - 40px) !important;
    height: auto !important;
  }

  .photo-img-wrap img {
    width: 100% !important;
    height: auto !important;
  }

  .text-item.style-large,
  .text-item.style-quote,
  .text-item.style-small {
    width: calc(100vw - 48px) !important;
  }

  #end-message {
    text-align: center;
    width: 100%;
    margin: 0 auto;
  }
}
</style>
</head>
<body id="top">

<div id="progress-line"></div>

<header class="site-header">
  <span class="site-name">_triniberta</span>
  <div class="header-right">
    <span class="site-count" id="photo-count"></span>
    <a class="back-to-top" href="#top">Volver arriba</a>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow">mi rincón del internet</p>
  <h1 class="hero-title">
    <em id="typing-target"></em><span class="typing-cursor">|</span>
  </h1>
  <div class="hero-divider"></div>
</section>

<main id="gallery"></main>
<div id="sentinel"></div>
<div id="end-message">
  <p>Has llegado al final de la galeria, ¡gracias por venir!</p>
  <a class="back-to-top" href="#top">Volver arriba</a>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const BATCH_SIZE = 6;

const PHOTO_SIZES = {
  small:   { w: 190, h: 140 },
  portrait:{ w: 230, h: 320 },
  wide:    { w: 390, h: 262 },
  large:   { w: 470, h: 352 },
};

// Scatter slots for photos: [marginLeftVW, rotateDeg]
// Cycle through these so photos land left, right, center alternately
const PHOTO_SLOTS = [
  [  5,  0    ],
  [ 54, -0.4  ],
  [ 10,  0.3  ],
  [ 58,  0    ],
  [ 22, -0.25 ],
  [ 62,  0.4  ],
  [  8,  0    ],
  [ 48,  0.3  ],
  [ 30, -0.3  ],
  [ 65,  0    ],
];

// Scatter slots for text items: [marginLeftVW]
const TEXT_SLOTS = {
  large: [ 8, 44, 12, 52],
  small: [60,  8, 68, 15],
};

// ── STATE ─────────────────────────────────────────────────────
let allItems   = [];
let rendered   = 0;
let loading    = false;
let finished   = false;
let photoCount = 0;
let photoSlotIdx = 0;
let textSlotIdx  = { large: 0, small: 0 };

// ── SCROLL PROGRESS ───────────────────────────────────────────
const progressLine = document.getElementById('progress-line');
window.addEventListener('scroll', () => {
  const scrolled = window.scrollY;
  const total    = document.documentElement.scrollHeight - window.innerHeight;
  progressLine.style.width = Math.min(100, (scrolled / total) * 100) + '%';
}, { passive: true });

// ── TYPING ANIMATION ──────────────────────────────────────────
(function() {
  const word   = 'I\'ve shot this picture before...';
  const target = document.getElementById('typing-target');
  let i = 0;
  function type() {
    target.textContent = word.slice(0, i);
    i++;
    if (i <= word.length) setTimeout(type, 95);
  }
  setTimeout(type, 420);
})();

// ── INIT ──────────────────────────────────────────────────────
fetch('gallery.json')
  .then(r => r.json())
  .then(data => {
    allItems   = data.sort((a, b) => new Date(b.date) - new Date(a.date));
    photoCount = allItems.filter(d => d.type === 'photo').length;
    let _pn = photoCount, _tn = 1;
    allItems.forEach(item => {
      item.id = item.type === 'photo'
        ? String(_pn--).padStart(3, '0')
        : 'T' + String(_tn++).padStart(2, '0');
    });
    document.getElementById('photo-count').textContent =
      photoCount + ' photo' + (photoCount !== 1 ? 's' : '');
    renderBatch();
    setupSentinel();
  })
  .catch(() => {
    document.getElementById('end-message').classList.add('visible');
  });

// ── RENDER BATCH ──────────────────────────────────────────────
function renderBatch() {
  if (loading || finished) return;
  loading = true;

  const batch = allItems.slice(rendered, rendered + BATCH_SIZE);

  if (batch.length === 0) {
    showEnd();
    loading = false;
    finished = true;
    return;
  }

  const gallery = document.getElementById('gallery');

  batch.forEach((item, i) => {
    const el = item.type === 'photo'
      ? buildPhoto(item)
      : buildText(item);

    // Stagger reveal delay
    el.style.transitionDelay = (i * 90) + 'ms';
    gallery.appendChild(el);
    observe(el);
  });

  rendered += batch.length;
  loading = false;

  if (rendered >= allItems.length) {
    setTimeout(showEnd, 700);
    finished = true;
  }
}

// ── BUILD PHOTO ────────────────────────────────────────────────
function buildPhoto(photo) {
  const size = PHOTO_SIZES[photo.size] || PHOTO_SIZES.small;
  const slot = PHOTO_SLOTS[photoSlotIdx % PHOTO_SLOTS.length];
  photoSlotIdx++;

  const item = document.createElement('div');
  item.className = `gallery-item photo-item size-${photo.size || 'small'}`;
  item.style.marginLeft = slot[0] + 'vw';
  if (slot[1] !== 0) item.style.transform = `translateY(20px) rotate(${slot[1]}deg)`;

  // Override revealed transform to preserve rotation
  if (slot[1] !== 0) {
    item.dataset.rot = slot[1];
  }

  // Label
  const label = document.createElement('div');
  label.className = 'photo-label';
  label.textContent = `[ ${photo.id} ]`;
  item.appendChild(label);

  // Image wrap
  const wrap = document.createElement('div');
  wrap.className = 'photo-img-wrap';
  wrap.style.width  = size.w + 'px';
  wrap.style.height = size.h + 'px';

  const img = document.createElement('img');
  img.src     = `photos/${photo.file}`;
  img.alt     = photo.caption || '';
  img.loading = 'lazy';
  img.onerror = function() {
    wrap.innerHTML = '';
    const ph = document.createElement('div');
    ph.className = 'photo-placeholder';
    const span = document.createElement('span');
    span.textContent = photo.file;
    ph.appendChild(span);
    wrap.appendChild(ph);
  };
  wrap.appendChild(img);
  item.appendChild(wrap);

  // Caption
  if (photo.caption) {
    const cap = document.createElement('div');
    cap.className = 'photo-caption';
    cap.textContent = photo.caption;
    item.appendChild(cap);
  }

  return item;
}

// ── BUILD TEXT ─────────────────────────────────────────────────
function buildText(textItem) {
  const style  = textItem.style || 'small';
  const slots  = TEXT_SLOTS[style] || TEXT_SLOTS.small;
  const leftVW = slots[textSlotIdx[style] % slots.length];
  textSlotIdx[style]++;

  const item = document.createElement('div');
  item.className = `gallery-item text-item style-${style}`;
  item.style.marginLeft = leftVW + 'vw';

  const p = document.createElement('p');
  p.textContent = textItem.content;
  item.appendChild(p);

  return item;
}

// ── REVEAL OBSERVER ────────────────────────────────────────────
const revealObs = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const el  = entry.target;
      const rot = el.dataset.rot;
      // Apply revealed state — preserve rotation if any
      el.style.transitionDelay = el.style.transitionDelay; // keep stagger
      if (rot) {
        el.style.transform = `translateY(0) rotate(${rot}deg)`;
      }
      el.classList.add('revealed');
      revealObs.unobserve(el);
    }
  });
}, { threshold: 0.06, rootMargin: '0px 0px -40px 0px' });

function observe(el) { revealObs.observe(el); }

// ── INFINITE SCROLL ────────────────────────────────────────────
function setupSentinel() {
  const sentinel = document.getElementById('sentinel');
  const loadObs  = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !loading && !finished) {
      renderBatch();
    }
  }, { rootMargin: '600px' });
  loadObs.observe(sentinel);
}

// ── END MESSAGE ────────────────────────────────────────────────
function showEnd() {
  const el  = document.getElementById('end-message');
  const obs = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
      el.classList.add('visible');
      obs.disconnect();
    }
  }, { threshold: 0.2 });
  obs.observe(el);
  setTimeout(() => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight) el.classList.add('visible');
  }, 800);
}
</script>
</body>
</html>
